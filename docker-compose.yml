services:
  dev:
    image: node:20-alpine
    container_name: academic-correction-dev
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    restart: unless-stopped

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic-correction-app
    ports:
      - '8080:80'
    restart: unless-stopped
